<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:
radial-gradient(circle at top,#2b0a1d 0%,#0d0d0d 45%,#000000 100%);
color:white;
overflow-x:hidden;
text-align:center;
}

.container{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

.logo{
width:220px;
margin-bottom:20px;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(255,80,140,0.6));
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

h1{
font-size:85px;
font-weight:900;
letter-spacing:4px;
margin-bottom:10px;
background:linear-gradient(to right,#ffffff,#ff7eb3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
font-size:26px;
color:#dddddd;
margin-bottom:50px;
}

.ca-box{
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
max-width:900px;
margin:auto;
margin-bottom:50px;
box-shadow:0 0 30px rgba(255,80,140,0.15);
}

.ca-title{
font-size:22px;
margin-bottom:15px;
color:#ff7eb3;
font-weight:bold;
letter-spacing:2px;
}

.ca{
font-size:18px;
word-break:break-word;
line-height:1.8;
}

.buttons{
margin-top:20px;
}

.btn{
display:inline-block;
margin:12px;
padding:18px 38px;
border-radius:18px;
text-decoration:none;
font-size:20px;
font-weight:bold;
transition:0.3s;
}

.telegram{
background:#229ED9;
color:white;
box-shadow:0 0 20px rgba(34,158,217,0.4);
}

.twitter{
background:white;
color:black;
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.buy{
background:#7CFF6B;
color:black;
box-shadow:0 0 20px rgba(124,255,107,0.5);
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
}

.stats{
margin-top:70px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
}

.stat{
background:rgba(255,255,255,0.06);
padding:30px;
width:220px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.stat:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.09);
}

.stat h2{
font-size:38px;
margin-bottom:10px;
color:#ff7eb3;
}

.stat p{
font-size:17px;
color:#cccccc;
}

.footer{
margin-top:90px;
font-size:15px;
color:gray;
padding-bottom:20px;
}

.glow{
position:fixed;
width:500px;
height:500px;
background:rgba(255,0,100,0.12);
filter:blur(120px);
z-index:-1;
}

.glow1{
top:-100px;
left:-100px;
}

.glow2{
bottom:-150px;
right:-100px;
}

</style>
</head>
